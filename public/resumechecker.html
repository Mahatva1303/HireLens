<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resumechecker</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="resumechecker.css">

</head>
<body>
     <nav class="navbar">

  <!-- LEFT: LOGO + NAME -->
  <div class="nav-left">
    <img src="images/hirelens-high-resolution-logo-transparent.png" alt="Logo">
    <span class="company-name"></span> HireLens </span>
  </div>

  <!-- RIGHT: MENU -->
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="resumechecker.html">ResumeChecker</a>
    <a href="review.html">Review Us</a>
    <a href="profile.html">Profile</a>
    <a href="login.html" class="login-btn">Login</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>HireLens ATS Resume Analyzer</h1>
    <p>Boost your resume score and get job-ready insights.</p>

    <input type="file" id="resumeInput">
    <button onclick="uploadResume()">Analyze Resume</button>
  </div>

  <div class="hero-right">
    <img src="images/download.jpg" alt="resume">
  </div>
</section>

<!-- DASHBOARD -->
<section class="dashboard">

  <!-- SCORE CARD -->
  <div class="card score-card">
    <h3>ATS Score</h3>
    <div class="circle">
      <span id="score">--</span>
    </div>
    <p id="rating"></p>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="card actions">
    <button onclick="generateSummary()"> Generate Summary</button>
    <button onclick="openPopup()"> Match with Job</button>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="card">
      <h3> Strengths</h3>
      <ul id="strengths"></ul>
    </div>

    <div class="card">
      <h3> Improvements</h3>
      <ul id="improvements"></ul>
    </div>

  </div>

  <!-- KEYWORDS -->
  <div class="card">
    <h3> Keywords Found</h3>
    <div id="keywords"></div>
  </div>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h3>Match Resume</h3>
    <input type="text" id="role" placeholder="Job Role">
    <input type="text" id="company" placeholder="Company">
    <button onclick="matchJob()">Submit</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="resumechecker.js"></script>
</body>
</html>
