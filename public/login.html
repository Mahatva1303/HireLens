<div class="container">

    <div class="left">
         <img src="images/hirelens-high-resolution-logo-transparent.png" alt="HireLens" class="hero-image" />
        <!-- <h1>HireLens</h1> -->
        <p>Your Smart Hiring Assistant</p>
    </div>

  
    <div class="right">
         <div class="login-card">
        <div class="form-box">
            <h2>Welcome back !</h2>
            <p id="form-title">Sign in to your account  </p>
          

            <!-- Name fields (only for signup) -->
            <input type="text" id="firstName" placeholder="First Name" style="display:none;">
            <input type="text" id="lastName" placeholder="Last Name" style="display:none;">

              <label>Email</label>

            <input type="email" id="email" placeholder="Enter Email">

            
              <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password">

            <button onclick="handleAuth()">login</button>

            <button class="google-btn" onclick="googleLogin()">Sign in with Google</button>

            <p id="toggle-text">
                Don't have an account?
                <span onclick="toggleForm()">Create Account</span>
            </p>
        </div>
        </div>
    </div>
