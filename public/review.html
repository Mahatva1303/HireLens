<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Us</title>
  <link rel="stylesheet" href="review.css">
</head>
<body>


 <nav class="navbar">

  <!-- LEFT: LOGO + NAME -->
  <div class="nav-left">
    <img src="images/hirelens-high-resolution-logo-transparent.png" alt="Logo">
    <span class="company-name"></span> HireLens </span>
  </div>

  <!-- RIGHT: MENU -->
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="resumechecker.html">ResumeChecker</a>
    <a href="review.html">Review Us</a>
    <a href="profile.html">Profile</a>
    <a href="login.html" class="login-btn">Login</a>
  </div>

</nav>




<div class="container">

  <div class="left">
     <video id="gifPreview" src="../images/Tq0XMI8w6MJr68T7I8.mp4" autoplay loop muted playsinline></video>
  </div>

  <div class="right">
    <h2>Tell us what you think</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email Address">

    <div class="stars" id="stars">
      <span onclick="setRating(1)">★</span>
      <span onclick="setRating(2)">★</span>
      <span onclick="setRating(3)">★</span>
      <span onclick="setRating(4)">★</span>
      <span onclick="setRating(5)">★</span>
    </div>

    <textarea id="comment" placeholder="Write review"></textarea>

    <button onclick="submitReview()">Submit Review</button>

    <p class="link" onclick="loadReviews()">View other reviews</p>

    <div id="reviewsContainer"></div>

  </div>

</div>

<script src="review.js"></script>
</body>
</html>
